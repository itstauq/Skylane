name: Deploy Pages

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy website and updates appcast
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Resolve appcast release tag
        id: release-tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="$(gh api "repos/${{ github.repository }}/releases/latest" --jq .tag_name)"
          else
            RELEASE_TAG="${{ github.event.release.tag_name }}"
          fi

          if [ -z "$RELEASE_TAG" ] || [ "$RELEASE_TAG" = "null" ]; then
            echo "Failed to resolve a release tag for appcast deployment" >&2
            exit 1
          fi

          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Check out site contents
        uses: actions/checkout@v4

      - name: Prepare Pages artifact
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release-tag.outputs.release_tag }}
        run: |
          PAGES_DIR="$RUNNER_TEMP/pages"
          mkdir -p "$PAGES_DIR"
          cp -R website/. "$PAGES_DIR"/
          DMG_URL="$(gh api "repos/${{ github.repository }}/releases/tags/${RELEASE_TAG}" --jq '.assets[] | select(.name | endswith(".dmg")) | .browser_download_url' | head -n 1)"

          if [ -z "$DMG_URL" ] || [ "$DMG_URL" = "null" ]; then
            echo "Failed to resolve DMG asset URL for release $RELEASE_TAG" >&2
            exit 1
          fi

          perl -0pi -e 's|__SKYLANE_DMG_URL__|$ENV{DMG_URL}|g' "$PAGES_DIR/index.html"
          perl -0pi -e 's|__SKYLANE_VERSION__|$ENV{RELEASE_TAG}|g' "$PAGES_DIR/index.html"
          gh release download "$RELEASE_TAG" \
            --repo "${{ github.repository }}" \
            --pattern appcast.xml \
            --dir "$PAGES_DIR"
          printf '%s\n' 'skylaneapp.com' > "$PAGES_DIR/CNAME"
          touch "$PAGES_DIR/.nojekyll"
          echo "PAGES_DIR=$PAGES_DIR" >> "$GITHUB_ENV"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.PAGES_DIR }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
